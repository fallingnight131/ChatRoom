# fallingnight.cn 域名 Nginx 配置文件
# 适用环境：宝塔面板 + Nginx + HTTPS + QUIC + HTTP2 + Vue前端 + API/WS代理

server {
    # 监听端口
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    
    # 启用HTTP2
    http2 on;
    
    # 域名配置
    server_name fallingnight.cn;
    
    # 索引文件优先级
    index index.php index.html index.htm default.php default.htm default.html;
    
    # 前端项目根目录
    root /www/wwwroot/chatroom/dist;

    # CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/fallingnight.cn.conf;
    # CERT-APPLY-CHECK--END
    
    # 面板扩展配置引入
    include /www/server/panel/vhost/nginx/extension/fallingnight.cn/*.conf;
    
    # SSL-START SSL相关配置
    # 请勿删除或修改下一行带注释的404规则
    # error_page 404/404.html;
    
    # HTTP_TO_HTTPS_START 强制HTTPS跳转
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    # HTTP_TO_HTTPS_END

    # SSL证书路径
    ssl_certificate    /www/server/panel/vhost/cert/fallingnight.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/fallingnight.cn/privkey.pem;
    
    # SSL协议和加密套件
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    
    # SSL会话缓存
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS配置（强制HTTPS）
    add_header Strict-Transport-Security "max-age=31536000";
    
    # Alt-Svc（QUIC/HTTP3）配置
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    
    # 497错误跳转（非HTTPS访问443端口）
    error_page 497  https://$host$request_uri;
    # SSL-END

    # ERROR-PAGE-START 错误页配置
    error_page 404 /404.html;
    # error_page 502 /502.html;
    # ERROR-PAGE-END

    # PHP-INFO-START PHP引用配置
    include enable-php-00.conf;
    # PHP-INFO-END
    
    # API-PROXY-START 后端API代理
    location /api/ {
        proxy_pass http://127.0.0.1:9529;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }
    # API-PROXY-END

    # WS-PROXY-START WebSocket反向代理
    location /ws {
        proxy_pass http://127.0.0.1:9528/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade websocket;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # WS-PROXY-END

    # VUE-ROUTER-START Vue前端路由（History模式）
    location / {
        try_files $uri $uri/ /index.html;
    }
    # VUE-ROUTER-END

    # REWRITE-START URL重写规则引用
    # 修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/fallingnight.cn.conf;
    # REWRITE-END

    # 禁止访问敏感文件/目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # 一键申请SSL证书验证目录相关设置
    location ~ \.well-known {
        allow all;
    }

    # 禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # 静态资源缓存配置
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$ {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    # 日志配置
    access_log  /www/wwwlogs/fallingnight.cn.log;
    error_log  /www/wwwlogs/fallingnight.cn.error.log;
}